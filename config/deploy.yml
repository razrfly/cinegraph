service: cinegraph
image: razrfly/cinegraph

servers:
  web:
    - 192.168.1.205

proxy:
  ssl: false
  host: cinegraph.org
  app_port: 4000
  healthcheck:
    path: /health
    interval: 3

deploy_timeout: 120

registry:
  server: ghcr.io
  username: razrfly
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: arm64

env:
  clear:
    PHX_HOST: cinegraph.org
    PHX_SERVER: "true"
    PORT: "4000"
    MIGRATE_ASYNC: "true"
    # Phase 0 of #910 — the previous default of 5 caused request pile-up,
    # LongPoll process memory growth, and kernel OOMs every 20-60s (255
    # restarts over 2026-05-10 → 2026-05-15). #908 raised the default to 15
    # and added queue_target/queue_interval; this env override holds the
    # prod-tested value of 25 to mirror POOL_SIZE.
    REPLICA_POOL_SIZE: "25"
  secret:
    - SECRET_KEY_BASE
    - DATABASE_USERNAME
    - DATABASE_PASSWORD
    - DATABASE_HOST
    - DATABASE_PORT
    - DATABASE
    - TMDB_API_KEY
    - OMDB_API_KEY
    - CRAWLBASE_API_KEY
    - CRAWLBASE_JS_API_KEY
    - ADMIN_USERNAME
    - ADMIN_PASSWORD
    - CINEGRAPH_API_KEY
    - APPSIGNAL_PUSH_API_KEY
    - UNSPLASH_ACCESS_KEY
    - PEXELS_API_KEY
    - PIXABAY_API_KEY
    - CLOUDFLARE_ACCOUNT_ID
    - CLOUDFLARE_ACCESS_KEY_ID
    - CLOUDFLARE_SECRET_ACCESS_KEY
    - R2_BUCKET
    - R2_CDN_URL

ssh:
  user: holden

logging:
  driver: json-file
  options:
    max-size: 50m
    max-file: "3"

aliases:
  shell: app exec --interactive --reuse "bash"
  logs: app logs
  console: app exec --interactive --reuse "/app/bin/cinegraph remote"
